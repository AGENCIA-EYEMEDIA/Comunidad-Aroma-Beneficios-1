<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Aroma - Beneficios</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#F5E7D9;
            font-family:Arial, Helvetica, sans-serif;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;

            padding:30px;

        }

        .contenedor{

            width:100%;
            max-width:900px;

        }

        img{

            width:100%;
            height:auto;

            display:block;

            border-radius:12px;

            box-shadow:0 8px 25px rgba(0,0,0,.15);

        }

        footer{

            margin-top:25px;

            text-align:center;

            color:#7A2B23;

            font-size:14px;

        }

    </style>

</head>

<body>

    <div class="contenedor">

        <img src="beneficios.png" alt="Beneficios Comunidad Aroma">

        <footer>
            © Comunidad Aroma de Café
        </footer>

    </div>

</body>
</html>
